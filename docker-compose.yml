# Task 4「修改後」：stat 使用 volumes 將主機 ./data 掛載到 /data，SQLite 持久化。
# 預設執行： docker compose up --build

name: listen-ai

services:
  nlp:
    build: ./nlp
    ports:
      - "8001:8001"
    environment:
      NLP_PORT: "8001"

  stat:
    build: ./stat
    ports:
      - "8002:8002"
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: /data/listenai.db
    volumes:
      - ./data:/data

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: http://stat:8002
      NLP_URL: http://nlp:8001
    depends_on:
      - nlp
      - stat

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      - gateway
